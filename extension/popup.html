<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { width: 300px; margin: 0; font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif; background: #fff; color: #0f172a; }
  .head { background: #273f4f; color: #fff; padding: 12px 14px; font-weight: 800; font-size: 14px; }
  .body { padding: 14px; }
  label { display: block; font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; margin: 10px 0 4px; }
  input { width: 100%; box-sizing: border-box; border: 1px solid #cbd5e1; border-radius: 10px; padding: 8px 10px; font-size: 12px; }
  button { width: 100%; margin-top: 12px; background: #e56425; color: #fff; border: 0; border-radius: 10px; padding: 9px; font-size: 13px; font-weight: 700; cursor: pointer; }
  button:hover { background: #d05014; }
  #status { margin-top: 10px; font-size: 12px; border-radius: 10px; padding: 8px 10px; display: none; }
  #status.ok { display: block; background: #dcfce7; color: #166534; }
  #status.bad { display: block; background: #fee2e2; color: #991b1b; }
  .hint { font-size: 11px; color: #94a3b8; margin-top: 10px; line-height: 1.5; }
  .hint a { color: #e56425; }
</style>
</head>
<body>
  <div class="head">🔥 RankForge for Etsy</div>
  <div class="body">
    <label for="base">RankForge URL</label>
    <input id="base" placeholder="http://localhost:3000" spellcheck="false">
    <label for="token">Extension token</label>
    <input id="token" type="password" placeholder="rfx_… (Settings → Chrome extension)" spellcheck="false">
    <button id="save">Save & test connection</button>
    <div id="status" role="status"></div>
    <p class="hint">The 2026 title checks on Etsy pages are free and work without a token. The token unlocks live keyword volume & competition, counted against your RankForge quota.</p>
  </div>
  <script src="popup.js"></script>
</body>
</html>
